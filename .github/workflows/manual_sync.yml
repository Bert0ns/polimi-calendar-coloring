name: Manual Calendar Sync

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to sync"
        required: true
        default: "lectures"
        type: choice
        options:
          - exams
          - lectures
      verbose:
        description: "Enable verbose logging"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reconstruct Secure Credentials
        run: |
          echo "${{ secrets.GCP_CREDENTIALS_JSON }}" > credentials.json
          echo "${{ secrets.GCP_TOKEN_PICKLE_B64 }}" | base64 --decode > token.pickle

          # Check if the token was decoded successfully
          if [ ! -f token.pickle ]; then
            echo "Error: Failed to reconstruct token.pickle from secrets."
            exit 1
          fi

      - name: Run Sync
        env:
          SOURCE_CALENDAR_NAME: ${{ secrets.SOURCE_CALENDAR_NAME || 'Polimi calendar' }}
          TARGET_CALENDAR_NAME: ${{ secrets.TARGET_CALENDAR_NAME || 'Polimi calendar Colored' }}
        run: |
          if [ "${{ inputs.verbose }}" == "true" ]; then
            python3 src/main.py ${{ inputs.target }} -v
          else
            python3 src/main.py ${{ inputs.target }}
          fi
